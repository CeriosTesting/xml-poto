name: Dependency Updates

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-dependencies:
    name: Update pnpm dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Update dependencies
        run: pnpm update -r --latest

      - name: Reinstall after update
        run: pnpm install

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(deps): update pnpm dependencies"
          title: "chore(deps): update pnpm dependencies"
          body: |
            Automated dependency update generated by workflow.

            - Ran `pnpm update -r --latest`
            - Updated lockfile and manifests as needed
          branch: "chore/deps-pnpm-updates"
          delete-branch: true
          labels: |
            dependencies
            pnpm
          add-paths: |
            pnpm-lock.yaml
            pnpm-workspace.yaml
            package.json
            packages/**/package.json
